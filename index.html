<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farm Plot Info</title>
  
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    h1 { color: #2c3e50; }
    .section { margin-bottom: 15px; }
    .buttons { margin-bottom: 20px; }
    button { margin-right: 10px; padding: 8px 12px; }

      /* New gallery layout */
    .images {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  margin-top: 10px;
}

.images img {
  width: 100%;
  height: auto;
  border: 2px solid #ccc;
  border-radius: 8px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
  transition: transform 0.2s ease;
}

.images img:hover {
  transform: scale(1.05);
  border-color: #2c3e50;
}
    .staff-info {
  background-color: #f0f8ff; /* light blue background */
  border: 2px solid #2c3e50; /* dark border for contrast */
  border-radius: 8px;
  padding: 15px;
  margin-top: 20px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
}

.staff-info h2 {
  margin-top: 0;
  color: #2c3e50;
}

  </style>
  
</head>
<body>
  <h1>Plot Information</h1>
  <div class="buttons">
    <button onclick="showVisitor()">Visitor View</button>
    <button onclick="showStaff()">Staff View</button>
  </div>
  <div id="plotData">Loading...</div>

  <script>
    // Get plot number from URL (e.g., plot.html?plot=1)
    const urlParams = new URLSearchParams(window.location.search);
    const plotNumber = urlParams.get("plot");

    let plotData = null;

    // Load JSON data for the plot from /plots folder
    if (plotNumber) {
      fetch(`plots/plot${plotNumber}.json`)
        .then(response => response.json())
        .then(data => { plotData = data; showVisitor(); })
        .catch(err => {
          document.getElementById("plotData").innerHTML = "Error loading plot data.";
          console.error(err);
        });
    } else {
      document.getElementById("plotData").innerHTML = "No plot specified in URL.";
    }

    function renderData(role) {
      if (!plotData) return;
      let html = `
        <div class="section"><strong>Plot Number:</strong> ${plotData.plotNumber}</div>
        <div class="section"><strong>Plant Name:</strong> ${plotData.plantName}</div>
        <div class="section"><strong>Date Planted:</strong> ${plotData.datePlanted}</div>
        <div class="section"><strong>Expected Harvest:</strong> ${plotData.expectedHarvest}</div>
        <div class="section"><strong>Uses:</strong> ${plotData.uses}</div>
        <div class="section"><strong>Fun Facts:</strong> ${plotData.funFacts}</div>
        <div class="section images">
          <strong>Plant Images:</strong><br>
          ${plotData.images.map(img => `<img src="${img}" alt="${plotData.plantName}">`).join("")}
        </div>
      `;
      if (role === "staff") {
        html += `
          <div class="section"><strong>Last Manure:</strong> ${plotData.lastManure}</div>
          <div class="section"><strong>Next Manure:</strong> ${plotData.nextManure}</div>
          <div class="section"><strong>Last Weeded:</strong> ${plotData.lastWeeded}</div>
          <div class="section"><strong>Last Scan:</strong> ${plotData.lastScan}</div>
        `;
      }
      document.getElementById("plotData").innerHTML = html;
    }

    function showVisitor() { renderData("visitor"); }
    function showStaff() { renderData("staff"); }
  </script>
</body>
</html>
