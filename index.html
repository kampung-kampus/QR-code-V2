<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farm Plot Info</title>
  
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    h1 { color: #2c3e50; }
    .section { margin-bottom: 15px; }
    .buttons { margin-bottom: 20px; }
    button { margin-right: 10px; padding: 8px 12px; }

      /* New gallery layout */
    .images {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  margin-top: 10px;
}

.images img {
  width: 100%;
  height: auto;
  border: 2px solid #ccc;
  border-radius: 8px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
  transition: transform 0.2s ease;
}

.images img:hover {
  transform: scale(1.05);
  border-color: #2c3e50;
}
    .staff-info {
  background-color: #f0f8ff; /* light blue background */
  border: 2px solid #2c3e50; /* dark border for contrast */
  border-radius: 8px;
  padding: 15px;
  margin-top: 20px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
}

.staff-info h2 {
  margin-top: 0;
  color: #2c3e50;
}

  </style>
  
</head>
<body>
 <h1>Farm Plot Information</h1>
  <p>Select a plot to view details:</p>
  <div class="links">
    <a href="plot.html?plot=1">Plot 1</a>
    <a href="plot.html?plot=2">Plot 2</a>
    <a href="plot.html?plot=3">Plot 3</a>
    <!-- Add more plots as needed -->
  </div>  
 
</body>
</html>
